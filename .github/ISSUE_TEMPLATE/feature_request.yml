name: Feature request
description: Propose an improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What operator/user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change and expected outcome.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and risks
      description: What components are touched (gateway/admin/worker/db/docs/infra)?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
    validations:
      required: true
