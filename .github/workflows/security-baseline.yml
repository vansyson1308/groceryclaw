name: Security Baseline

on:
  push:
    branches:
      - main
      - work
  pull_request:
  schedule:
    - cron: '20 2 * * 1'

jobs:
  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  deps-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm install

      - name: npm audit (high+)
        env:
          SECURITY_AUDIT_WARN_ONLY: 'false'
        run: |
          set -euo pipefail
          npm i --package-lock-only --ignore-scripts --no-audit
          if npm audit --omit=dev --audit-level=high; then
            exit 0
          fi

          if [ "${SECURITY_AUDIT_WARN_ONLY}" = "true" ]; then
            echo "WARN: npm audit failed but SECURITY_AUDIT_WARN_ONLY=true"
            exit 0
          fi

          echo "ERROR: high/critical vulnerabilities detected"
          exit 1

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          GITLEAKS_CONFIG: .gitleaks.toml
