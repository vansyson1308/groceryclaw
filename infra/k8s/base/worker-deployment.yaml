apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: worker
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/example/groceryclaw-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
              name: http
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: REDIS_URL
            - name: WORKER_MEK_B64
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: WORKER_MEK_B64
            - name: KIOTVIET_STUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: KIOTVIET_STUB_TOKEN
            - name: ZALO_STUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ZALO_STUB_TOKEN
            - name: WORKER_METRICS_HOST
              value: "0.0.0.0"
            - name: WORKER_METRICS_PORT
              value: "9090"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 384Mi
            limits:
              cpu: 1000m
              memory: 1Gi
