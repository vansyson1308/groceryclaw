apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: groceryclaw-v2-alerts
  labels:
    app.kubernetes.io/part-of: groceryclaw-v2
spec:
  groups:
    - name: groceryclaw-v2-risks
      rules:
        # ACK p95/webhook auth failures are expected from gateway metrics/log pipeline.
        # Keep these rules disabled until gateway histogram/export is available.
        - alert: GroceryclawGatewayAckP95High
          expr: vector(0)
          for: 10m
          labels:
            severity: warning
            runbook: docs/saas_v2/RUNBOOK.md#webhook-auth-failures-spike
          annotations:
            summary: "Gateway ACK p95 above SLO"
            description: "Enable this rule once `groceryclaw_gateway_ack_ms_bucket` is exported."
        - alert: GroceryclawWebhookAuthFailuresHigh
          expr: vector(0)
          for: 10m
          labels:
            severity: warning
            runbook: docs/saas_v2/RUNBOOK.md#webhook-auth-failures-spike
          annotations:
            summary: "Webhook auth failures above baseline"
            description: "Enable once `groceryclaw_gateway_webhook_auth_failures_total` exists."
        - alert: GroceryclawQueueLagHigh
          expr: |
            (
              rate(groceryclaw_worker_queue_lag_ms_total[5m])
              /
              clamp_min(rate(groceryclaw_worker_queue_lag_samples_total[5m]), 1)
            ) > 2000
          for: 10m
          labels:
            severity: warning
            runbook: docs/saas_v2/RUNBOOK.md#queue-backlog-surge
          annotations:
            summary: "Worker queue lag average above 2s"
            description: "Scale workers and inspect Redis/DB health."
        - alert: GroceryclawWorkerFailureRateHigh
          expr: |
            rate(groceryclaw_worker_job_failures_total[10m])
            /
            clamp_min(rate(groceryclaw_worker_jobs_processed_total[10m]), 1)
            > 0.05
          for: 15m
          labels:
            severity: warning
            runbook: docs/saas_v2/RUNBOOK.md#queue-backlog-surge
          annotations:
            summary: "Worker failure ratio above 5%"
            description: "Inspect DLQ and failing job types."
        - alert: GroceryclawNotifierPendingBacklogHigh
          expr: groceryclaw_notifier_pending_backlog > 200
          for: 15m
          labels:
            severity: warning
            runbook: docs/saas_v2/RUNBOOK.md#notifier-storms-and-pending-backlog
          annotations:
            summary: "Notifier pending backlog above threshold"
            description: "Investigate interaction-window flush and outbound limits."
        - alert: GroceryclawDlqSpike
          expr: vector(0)
          for: 10m
          labels:
            severity: warning
            runbook: docs/saas_v2/RUNBOOK.md#queue-backlog-surge
          annotations:
            summary: "DLQ growth detected"
            description: "Enable once `groceryclaw_dlq_jobs_total` is exported."
