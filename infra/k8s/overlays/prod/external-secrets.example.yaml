# Example only. Requires external-secrets operator and a ClusterSecretStore named `cloud-secret-store`.
# Do not commit real secret values to Git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: cloud-secret-store
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_APP_URL
      remoteRef:
        key: groceryclaw/prod/DB_APP_URL
    - secretKey: DB_ADMIN_URL
      remoteRef:
        key: groceryclaw/prod/DB_ADMIN_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: groceryclaw/prod/REDIS_URL
    - secretKey: WEBHOOK_SIGNATURE_SECRET
      remoteRef:
        key: groceryclaw/prod/WEBHOOK_SIGNATURE_SECRET
    - secretKey: INVITE_PEPPER_B64
      remoteRef:
        key: groceryclaw/prod/INVITE_PEPPER_B64
    - secretKey: ADMIN_MEK_B64
      remoteRef:
        key: groceryclaw/prod/ADMIN_MEK_B64
    - secretKey: WORKER_MEK_B64
      remoteRef:
        key: groceryclaw/prod/WORKER_MEK_B64
    - secretKey: ADMIN_OIDC_ISSUER
      remoteRef:
        key: groceryclaw/prod/ADMIN_OIDC_ISSUER
    - secretKey: ADMIN_OIDC_AUDIENCE
      remoteRef:
        key: groceryclaw/prod/ADMIN_OIDC_AUDIENCE
    - secretKey: ADMIN_OIDC_JWKS_URI
      remoteRef:
        key: groceryclaw/prod/ADMIN_OIDC_JWKS_URI
    - secretKey: ADMIN_BREAKGLASS_KEY
      remoteRef:
        key: groceryclaw/prod/ADMIN_BREAKGLASS_KEY
