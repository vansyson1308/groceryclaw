apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: groceryclaw-v2
type: Opaque
stringData:
  # Never commit real values. Create a real Secret in your private deployment repo/secret manager.
  POSTGRES_URL: postgresql://user:password@postgres.internal:5432/groceryclaw_v2
  REDIS_URL: redis://:password@redis.internal:6379
  WEBHOOK_SIGNATURE_SECRET: replace-me
  ADMIN_INVITE_PEPPER: replace-me
  ADMIN_MEK_B64: replace-me-base64
  WORKER_MEK_B64: replace-me-base64
  ADMIN_OIDC_ISSUER: https://issuer.example.com
  ADMIN_OIDC_AUDIENCE: groceryclaw-admin
  ADMIN_OIDC_JWKS_URI: https://issuer.example.com/.well-known/jwks.json
  KIOTVIET_STUB_TOKEN: replace-me
  ZALO_STUB_TOKEN: replace-me
